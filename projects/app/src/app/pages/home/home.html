<lib-input
  [label]="'Filter'"
  [placeholder]="'Ex. Hydrogen'"
  [value]="filter()"
  (valueChange)="filter.set($event)"
/>
<lib-table [data]="data" [filter]="filter()" [paginator]="paginator()" />
<lib-paginator
  [pageSizeOptions]="[5, 10, 25, 50, 100]"
  [pageSize]="50"
  ariaLabel="Select page of periodic elements"
  (paginatorReady)="onPaginatorReady($event)"
/>
